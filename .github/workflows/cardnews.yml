name: 카드뉴스 자동 생성 & SNS 게시

on:
  schedule:
    # 아침 8시 KST (UTC 23:00 전날) — 주식
    - cron: '0 23 * * *'
    # 낮 2시 KST (UTC 05:00) — 재테크/건강 격일
    - cron: '0 5 * * *'
    # 저녁 8시 KST (UTC 11:00) — 최신뉴스
    - cron: '0 11 * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: Puppeteer 브라우저 설치
        run: npx puppeteer browsers install chrome

      - name: 카드뉴스 파이프라인 실행 (생성 + SNS 게시)
        env:
          # AI 생성
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # 이미지 수집
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          # 이미지 호스팅 (Instagram/Facebook용 공개 URL)
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          # Instagram
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          # Facebook
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          # Band
          BAND_ACCESS_TOKEN: ${{ secrets.BAND_ACCESS_TOKEN }}
          BAND_KEY: ${{ secrets.BAND_KEY }}
          # Telegram (카카오 대체)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node src/pipeline.js

      - name: 결과물 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: cardnews-${{ github.run_number }}
          path: output/cardnews/*.png
          retention-days: 7
