name: 카드뉴스 자동 생성

on:
  schedule:
    # 한국시간 05:00 (UTC 20:00 전날)
    - cron: '0 20 * * *'
    # 한국시간 18:00 (UTC 09:00)
    - cron: '0 9 * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  generate-cardnews:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: Puppeteer 브라우저 설치
        run: npx puppeteer browsers install chrome

      - name: 카드뉴스 파이프라인 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node src/pipeline.js

      - name: 결과물 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: cardnews-${{ github.run_number }}
          path: output/cardnews/*.png
          retention-days: 7

      # TODO: 텔레그램 알림 추가
      # TODO: 5개 채널 배포 추가
