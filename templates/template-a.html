<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }

  .card {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
  }

  /* 배경 이미지 */
  .bg-image {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.3;
  }

  /* 그라디언트 오버레이 */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      180deg,
      rgba(26, 26, 46, 0.7) 0%,
      rgba(26, 26, 46, 0.85) 40%,
      rgba(26, 26, 46, 0.95) 100%
    );
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 60px;
  }

  /* 상단 카테고리 태그 */
  .category-tag {
    display: inline-block;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-size: 22px;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 30px;
    width: fit-content;
    letter-spacing: 1px;
  }

  /* 날짜 */
  .date {
    color: rgba(255, 255, 255, 0.6);
    font-size: 20px;
    margin-top: 16px;
    font-weight: 400;
  }

  /* 메인 타이틀 */
  .title {
    color: white;
    font-size: 52px;
    font-weight: 900;
    line-height: 1.3;
    margin-top: 40px;
    flex-shrink: 0;
  }

  .title .highlight {
    color: #ffd700;
  }

  /* 구분선 */
  .divider {
    width: 80px;
    height: 4px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    margin-top: 36px;
    border-radius: 2px;
  }

  /* 요약 내용 */
  .summary {
    color: rgba(255, 255, 255, 0.85);
    font-size: 28px;
    line-height: 1.7;
    margin-top: 32px;
    flex-grow: 1;
    display: flex;
    align-items: center;
  }

  .summary-text {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .summary-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .summary-icon {
    font-size: 24px;
    flex-shrink: 0;
    margin-top: 4px;
  }

  /* 하단 브랜딩 */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 30px;
    border-top: 1px solid rgba(255, 255, 255, 0.15);
  }

  .brand {
    color: rgba(255, 255, 255, 0.5);
    font-size: 20px;
    font-weight: 500;
  }

  .brand-name {
    color: rgba(255, 255, 255, 0.7);
    font-weight: 700;
  }

  .page-number {
    color: rgba(255, 255, 255, 0.4);
    font-size: 18px;
  }
</style>
</head>
<body>
<div class="card">
  <img class="bg-image" src="{{IMAGE_URL}}" alt="">
  <div class="overlay"></div>
  <div class="content">
    <div class="category-tag">{{CATEGORY}}</div>
    <div class="date">{{DATE}}</div>
    <div class="title">{{TITLE}}</div>
    <div class="divider"></div>
    <div class="summary">
      <div class="summary-text">
        {{SUMMARY_ITEMS}}
      </div>
    </div>
    <div class="footer">
      <div class="brand"><span class="brand-name">황혼 즈음에</span> 매거진</div>
      <div class="page-number">{{PAGE}}</div>
    </div>
  </div>
</div>
</body>
</html>
