<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }

  .card {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: #ffffff;
    display: flex;
    flex-direction: column;
  }

  /* 상단 이미지 영역 */
  .image-section {
    width: 100%;
    height: 480px;
    position: relative;
    overflow: hidden;
  }

  .bg-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .image-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 120px;
    background: linear-gradient(0deg, #ffffff 0%, transparent 100%);
  }

  /* 카테고리 뱃지 */
  .category-badge {
    position: absolute;
    top: 32px;
    left: 40px;
    background: #e74c3c;
    color: white;
    font-size: 20px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .category-badge.finance { background: #2c3e50; }
  .category-badge.policy { background: #27ae60; }
  .category-badge.health { background: #e74c3c; }

  /* 하단 텍스트 영역 */
  .text-section {
    flex: 1;
    padding: 40px 50px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .date {
    color: #999;
    font-size: 18px;
    font-weight: 500;
  }

  .title {
    color: #1a1a1a;
    font-size: 46px;
    font-weight: 900;
    line-height: 1.35;
    margin-top: 16px;
  }

  .title .accent {
    color: #e74c3c;
  }

  .summary-list {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex-grow: 1;
  }

  .summary-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    color: #444;
    font-size: 24px;
    line-height: 1.5;
  }

  .bullet {
    width: 8px;
    height: 8px;
    background: #e74c3c;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 12px;
  }

  .bullet.finance { background: #2c3e50; }
  .bullet.policy { background: #27ae60; }
  .bullet.health { background: #e74c3c; }

  /* 하단 */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 20px;
    border-top: 2px solid #f0f0f0;
  }

  .brand {
    font-size: 20px;
    color: #bbb;
    font-weight: 500;
  }

  .brand-name {
    color: #333;
    font-weight: 700;
  }

  .swipe-hint {
    color: #ccc;
    font-size: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="image-section">
    <img class="bg-image" src="{{IMAGE_URL}}" alt="">
    <div class="image-overlay"></div>
    <div class="category-badge {{CATEGORY_CLASS}}">{{CATEGORY}}</div>
  </div>
  <div class="text-section">
    <div>
      <div class="date">{{DATE}}</div>
      <div class="title">{{TITLE}}</div>
      <div class="summary-list">
        {{SUMMARY_ITEMS}}
      </div>
    </div>
    <div class="footer">
      <div class="brand"><span class="brand-name">황혼 즈음에</span> 매거진</div>
      <div class="swipe-hint">{{PAGE}}</div>
    </div>
  </div>
</div>
</body>
</html>
