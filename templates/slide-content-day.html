<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: {{BG_COLOR}};
  }

  .bg-image {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url('{{IMAGE_URL}}');
    background-size: cover;
    background-position: center;
    z-index: 1;
    opacity: 0.18;
  }

  .bg-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(
      160deg,
      rgba(0,0,0,0.20) 0%,
      rgba(0,0,0,0.15) 40%,
      rgba(0,0,0,0.70) 75%,
      rgba(0,0,0,0.92) 100%
    );
    z-index: 2;
  }

  /* 상단 강조선 */
  .brand-line {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 6px;
    background: linear-gradient(90deg, {{ACCENT_COLOR}} 0%, {{ACCENT_LIGHT}} 50%, {{ACCENT_COLOR}} 100%);
    z-index: 4;
  }

  /* 좌측 세로 장식선 */
  .side-accent {
    position: absolute;
    left: 0; top: 0;
    width: 8px; height: 100%;
    background: linear-gradient(180deg, {{ACCENT_COLOR}} 0%, transparent 100%);
    z-index: 3;
    opacity: 0.5;
  }

  .content {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 38px 84px 0;
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-logo {
    width: 44px;
    height: 44px;
    border-radius: 11px;
    object-fit: cover;
  }

  .brand-name {
    font-size: 31px;
    font-weight: 700;
    color: rgba(255,255,255,0.80);
    letter-spacing: 1px;
  }

  /* 카테고리 뱃지 — 악센트 컬러 */
  .category-badge {
    padding: 10px 28px;
    border-radius: 24px;
    font-size: 28px;
    font-weight: 600;
    color: {{ACCENT_COLOR}};
    background: {{ACCENT_COLOR}}26;
    border: 1.5px solid {{ACCENT_COLOR}}80;
    backdrop-filter: blur(10px);
  }

  .title-area {
    padding: 100px 84px 0;
    flex-shrink: 0;
  }

  .news-title {
    font-size: 78px;
    font-weight: 400;
    color: white;
    line-height: 1.35;
    word-break: keep-all;
    overflow-wrap: break-word;
    letter-spacing: -1px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    margin-bottom: 22px;
  }

  /* 구분선 — 악센트 컬러 */
  .divider {
    width: 60px;
    height: 5px;
    background: {{ACCENT_COLOR}};
    border-radius: 3px;
  }

  .key-section {
    position: absolute;
    bottom: 90px;
    left: 84px;
    right: 84px;
  }

  .key-points {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* 키포인트 박스 — 악센트 컬러 좌측 테두리 */
  .key-point {
    display: flex;
    align-items: center;
    gap: 22px;
    padding: 28px 34px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    border-left: 7px solid {{ACCENT_COLOR}};
    border-top: 1px solid rgba(255,255,255,0.10);
    border-right: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
  }

  .key-point-icon {
    color: {{ACCENT_COLOR}};
    font-size: 42px;
    font-weight: 900;
    flex-shrink: 0;
  }

  .key-point-text {
    font-size: 42px;
    color: white;
    line-height: 1.55;
    font-weight: 600;
    word-break: keep-all;
    overflow-wrap: break-word;
    text-shadow: 0 1px 6px rgba(0,0,0,0.3);
  }

  .highlight {
    color: {{ACCENT_LIGHT}};
    font-weight: 800;
  }

  .source {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 18px 84px 38px;
    border-top: 1px solid rgba(255,255,255,0.10);
    font-size: 25px;
    color: rgba(255,255,255,0.40);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="brand-line"></div>
  <div class="side-accent"></div>
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <div class="content">
    <div class="header">
      <div class="brand">
        <img class="brand-logo" src="{{LOGO_URL}}" alt="황혼 즈음에">
        <span class="brand-name">황혼 즈음에</span>
      </div>
      <div class="category-badge">{{CATEGORY}}</div>
    </div>

    <div class="title-area">
      <h2 class="news-title">{{TITLE}}</h2>
      <div class="divider"></div>
    </div>

    <div class="key-section">
      <div class="key-points">
        {{KEY_POINTS}}
      </div>
    </div>

    <div class="source">
      <span>출처: {{SOURCE}}</span>
      <span>{{DATE}}</span>
    </div>
  </div>
</div>
</body>
</html>
